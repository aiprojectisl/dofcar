name: DOF Vault

on:
  workflow_dispatch:
    inputs:
      uid:
        description: 'User ID to sync (kosong = all)'
        required: true
        default: '106786888914632369739'
      stage:
        description: 'Stage: all | discovery | scrape_detail | reconcile | upload_gdrive'
        required: false
        default: ''
      debug_mode:
        description: 'Debug mode — print raw HTML ke log (true/false)'
        required: false
        default: 'false'

concurrency:
  group: dof-vault
  cancel-in-progress: false

jobs:
  vault:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout dofvault (private)
        uses: actions/checkout@v4
        with:
          repository: aiprojectisl/dofvault
          token: ${{ secrets.PAT_VAULT }}
          path: vault

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vault/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev --prefer-offline
        working-directory: vault

      - name: Run vault
        working-directory: vault
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          CREDS_SECRET:  ${{ secrets.CREDS_SECRET }}
          GDRIVE_CLIENT_ID:       ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET:   ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN:   ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID:  ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
          TARGET_UID:    ${{ github.event.inputs.uid }}
          STAGE:         ${{ github.event.inputs.stage || 'all' }}
          DEBUG_MODE:    ${{ github.event.inputs.debug_mode || 'false' }}
          
        run: node main.js