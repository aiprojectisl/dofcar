name: DOF Vault

on:
  workflow_dispatch:
    inputs:
      target_uid:
        description: 'Single user_id to process (leave empty for all users)'
        required: false
        default: ''
      is_init:
        description: 'Inisiasi pertama kali untuk user baru (true/false)'
        required: false
        default: 'false'
      max_detail:
        description: 'Max surat detail to process per run (0 = unlimited)'
        required: false
        default: '50'

concurrency:
  group: dof-vault
  cancel-in-progress: false

jobs:
  vault:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout vault (private)
        uses: actions/checkout@v4
        with:
          repository: aiprojectisl/dofvault
          token: ${{ secrets.PAT_VAULT }}
          path: vault

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vault/package-lock.json

      - name: Install dependencies
        run: npm install --omit=dev
        working-directory: vault

      - name: Run vault
        working-directory: vault
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          CREDS_SECRET:  ${{ secrets.CREDS_SECRET }}
          GAS_URL:       ${{ secrets.GAS_URL }}
          GAS_TOKEN:     ${{ secrets.GAS_TOKEN }}
          TARGET_UID:    ${{ github.event.inputs.target_uid }}
          IS_INIT:       ${{ github.event.inputs.is_init }}
          MAX_DETAIL:    ${{ github.event.inputs.max_detail }}
        run: node main.js
