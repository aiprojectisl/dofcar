name: DOF Car

on:
  schedule:
    - cron: '0 2,4,6,8,10 * * 1-5'      # 09,11,13,15,17 WIB weekday
    - cron: '0 11,13 * * 1-5'            # 18,20 WIB weekday
    - cron: '0 22 * * 1-5'              # 05 WIB weekday
    - cron: '0 2,8,11,13 * * 0,6'       # weekend
  workflow_dispatch:
    inputs:
      uid:
        description: 'User ID to sync (empty = all)'
        required: false
        default: ''
      is_init:
        description: 'Is this a first-time init sync?'
        required: false
        default: 'false'

concurrency:
  group: dof-car
  cancel-in-progress: false

jobs:
  car:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout scraper (private)
        uses: actions/checkout@v4
        with:
          repository: aiprojectisl/dofnotify
          token: ${{ secrets.PAT_READ }}
          path: car

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: car/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev --prefer-offline
        working-directory: car

      - name: Run car
        working-directory: car
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          BOT_SECRET:    ${{ secrets.BOT_SECRET }}
          VERCEL_URL:    ${{ secrets.VERCEL_URL }}
          TARGET_UID:    ${{ github.event.inputs.uid }}
          IS_INIT:       ${{ github.event.inputs.is_init }}
        run: node test_fetch_all.js