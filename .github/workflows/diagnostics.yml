name: DOF Vault — Diagnostic

on:
  workflow_dispatch:
    inputs:
      uid:
        description: 'User ID to diagnose'
        required: true
        default: '106786888914632369739'
      checks:
        description: 'Checks to run: all | all+gdrive | 1,3,5'
        required: false
        default: 'all'

jobs:
  diagnostic:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout dofvault (private)
        uses: actions/checkout@v4
        with:
          repository: aiprojectisl/dofvault
          token: ${{ secrets.PAT_VAULT }}
          path: vault

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: vault/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev --prefer-offline
        working-directory: vault

      - name: Run diagnostic
        working-directory: vault
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          GDRIVE_CLIENT_ID:      ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET:  ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN:  ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
          TARGET_UID:            ${{ github.event.inputs.uid }}
        run: node tools/diagnostic.js --uid=${{ github.event.inputs.uid }} --checks=${{ github.event.inputs.checks }}