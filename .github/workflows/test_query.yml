workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: false
        default: 'memo internal RDMP'
      uid:
        description: 'User ID'
        required: false
        default: '106786888914632369739'
      limit:
        description: 'Result limit'
        required: false
        default: '5'
      mode:
        description: 'Search mode (vector | fulltext | hybrid)'
        required: false
        default: 'hybrid'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test RAG query endpoint
        run: |
          echo "🔍 Query  : ${{ inputs.query }}"
          echo "👤 UID    : ${{ inputs.uid }}"
          echo "📊 Limit  : ${{ inputs.limit }}"
          echo "⚙️  Mode   : ${{ inputs.mode }}"
          echo ""

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://dofvault.vercel.app/api/query \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"${{ inputs.query }}\",
              \"uid\": \"${{ inputs.uid }}\",
              \"limit\": ${{ inputs.limit }},
              \"mode\": \"${{ inputs.mode }}\"
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "📡 HTTP Status: $HTTP_CODE"
          echo ""
          echo "📋 Response:"
          echo "$BODY" | jq .